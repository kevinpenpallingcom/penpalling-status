# Upptime config — see https://upptime.js.org/docs/configuration
owner: kevinpenpallingcom
repo: penpalling-status

sites:
  - name: Penpalling API (staging)
    url: https://api-staging.penpalling.com/health
    expectedStatusCodes:
      - 200
  - name: Web portal
    url: https://beta.penpalling.com
    expectedStatusCodes:
      - 200

status-website:
  cname: penpalling-status.com
  name: Penpalling Status
  introTitle: "**Penpalling** service status"
  introMessage: Live uptime and response-time history for Penpalling services, monitored from outside our infrastructure every 5 minutes.
  navbar:
    - title: Status
      href: /
    - title: Penpalling
      href: https://penpalling.com

# Down incidents open GitHub issues on this repo automatically.
assignees:
  - kevinpenpallingcom

